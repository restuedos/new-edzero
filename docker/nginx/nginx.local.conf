worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Docker embedded DNS — defer upstream resolution so optional Compose profiles
    # (meilisearch, rabbitmq, pgadmin, …) can be off without nginx failing at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name
            edzero.test www.edzero.test
            license.edzero.test
            minio.edzero.test s3.edzero.test
            pgadmin.edzero.test mailpit.edzero.test
            redis.edzero.test meilisearch.edzero.test
            rabbitmq.edzero.test;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- Main site (Next.js + Payload CMS) ---
    server {
        listen 443 ssl;
        server_name edzero.test www.edzero.test;

        ssl_certificate     /etc/ssl/edzero.test.pem;
        ssl_certificate_key /etc/ssl/edzero.test-key.pem;
        client_max_body_size 50M;

        location / {
            set $site_upstream site:3000;
            proxy_pass http://$site_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # --- License admin (React) + API ---
    server {
        listen 443 ssl;
        server_name license.edzero.test;

        ssl_certificate     /etc/ssl/edzero.test.pem;
        ssl_certificate_key /etc/ssl/edzero.test-key.pem;
        client_max_body_size 50M;

        location /api/ {
            set $license_api_upstream license-server:3001;
            proxy_pass http://$license_api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            set $license_web_upstream license-web:80;
            proxy_pass http://$license_web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- MinIO Console ---
    server {
        listen 443 ssl;
        server_name minio.edzero.test;

        ssl_certificate     /etc/ssl/edzero.test.pem;
        ssl_certificate_key /etc/ssl/edzero.test-key.pem;
        client_max_body_size 50M;

        location / {
            set $minio_console_upstream minio:9001;
            proxy_pass http://$minio_console_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # --- MinIO S3 API ---
    server {
        listen 443 ssl;
        server_name s3.edzero.test;

        ssl_certificate     /etc/ssl/edzero.test.pem;
        ssl_certificate_key /etc/ssl/edzero.test-key.pem;
        client_max_body_size 50M;

        location / {
            set $minio_api_upstream minio:9000;
            proxy_pass http://$minio_api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # --- pgAdmin ---
    server {
        listen 443 ssl;
        server_name pgadmin.edzero.test;

        ssl_certificate     /etc/ssl/edzero.test.pem;
        ssl_certificate_key /etc/ssl/edzero.test-key.pem;

        location / {
            set $pgadmin_upstream pgadmin:80;
            proxy_pass http://$pgadmin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- Mailpit ---
    server {
        listen 443 ssl;
        server_name mailpit.edzero.test;

        ssl_certificate     /etc/ssl/edzero.test.pem;
        ssl_certificate_key /etc/ssl/edzero.test-key.pem;

        location / {
            proxy_pass http://mailpit:8025;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- RedisInsight ---
    server {
        listen 443 ssl;
        server_name redis.edzero.test;

        ssl_certificate     /etc/ssl/edzero.test.pem;
        ssl_certificate_key /etc/ssl/edzero.test-key.pem;

        location / {
            set $redisinsight_upstream redisinsight:5540;
            proxy_pass http://$redisinsight_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- Meilisearch ---
    server {
        listen 443 ssl;
        server_name meilisearch.edzero.test;

        ssl_certificate     /etc/ssl/edzero.test.pem;
        ssl_certificate_key /etc/ssl/edzero.test-key.pem;

        location / {
            set $meilisearch_upstream meilisearch:7700;
            proxy_pass http://$meilisearch_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # --- RabbitMQ Management ---
    server {
        listen 443 ssl;
        server_name rabbitmq.edzero.test;

        ssl_certificate     /etc/ssl/edzero.test.pem;
        ssl_certificate_key /etc/ssl/edzero.test-key.pem;

        location / {
            set $rabbitmq_upstream rabbitmq:15672;
            proxy_pass http://$rabbitmq_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
