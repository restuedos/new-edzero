services:
  site:
    build:
      context: .
      dockerfile: docker/site/Dockerfile
      args:
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-${APP_URL:-https://edzero.test}}
    ports:
      - '${FORWARD_SITE_PORT:-3000}:3000'
    env_file:
      - .env.local
    environment:
      SITE_DATABASE_URL: postgresql://${SITE_DB_USERNAME:-site}:${SITE_DB_PASSWORD:-secret}@pgsql:5432/${SITE_DB_DATABASE:-site}
      DATABASE_URL: postgresql://${SITE_DB_USERNAME:-site}:${SITE_DB_PASSWORD:-secret}@pgsql:5432/${SITE_DB_DATABASE:-site}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET:-edzero-dev-payload-secret-change-me}
      APP_URL: ${APP_URL:-https://edzero.test}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-${APP_URL:-https://edzero.test}}
      NODE_ENV: production
      # Middleware status check must loop back to this container (public URL unreachable from inside Docker)
      INTERNAL_APP_URL: ${INTERNAL_APP_URL:-http://127.0.0.1:3000}
      # Site → license-server via Docker network (public HTTPS URL unreachable from inside containers)
      LICENSE_VERIFY_URL: ${LICENSE_VERIFY_URL_INTERNAL:-http://license-server:3001/api/license/verify}
      LICENSE_REQUIRE_HTTPS: 'false'
      LICENSE_STATUS_FILE: /app/storage/private/license.json
      LICENSE_ENCRYPTION_PUBLIC_KEY_PATH: /app/storage/private/license-encryption-public.rsa
      LICENSE_VERIFICATION_PUBLIC_KEY_PATH: /app/storage/private/license-verification-public.rsa
      PAYLOAD_DB_PUSH: 'true'
      AWS_ENDPOINT: ${AWS_ENDPOINT_INTERNAL:-http://minio:9000}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-https://s3.edzero.test}
    volumes:
      - ./storage:/app/storage
    depends_on:
      pgsql:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks:
      - app_net

  license-server:
    profiles: [license]
    build:
      context: .
      dockerfile: docker/license-server/Dockerfile
    ports:
      - '${FORWARD_LICENSE_PORT:-3001}:3001'
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://${LICENSE_DB_USERNAME:-license}:${LICENSE_DB_PASSWORD:-secret}@license-pgsql:5432/${LICENSE_DB_DATABASE:-license}
      PORT: 3001
    volumes:
      - ./client-keys:/app/client-keys:ro
    depends_on:
      license-pgsql:
        condition: service_healthy
    networks:
      - app_net

  license-web:
    profiles: [license]
    build:
      context: .
      dockerfile: docker/license-web/Dockerfile
      args:
        VITE_LICENSE_API_URL: https://license.edzero.test/api
    expose:
      - '80'
    networks:
      - app_net

  nginx:
    image: nginx:stable-alpine
    ports:
      - '${FORWARD_HTTP_PORT:-80}:80'
      - '${FORWARD_HTTPS_PORT:-443}:443'
    volumes:
      - ./docker/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs/edzero.test.pem:/etc/ssl/edzero.test.pem:ro
      - ./docker/nginx/certs/edzero.test-key.pem:/etc/ssl/edzero.test-key.pem:ro
    depends_on:
      - site
    networks:
      - app_net

  pgsql:
    image: postgres:17
    ports:
      - '${FORWARD_DB_PORT:-5432}:5432'
    environment:
      POSTGRES_DB: ${DB_DATABASE:-edzero}
      POSTGRES_USER: ${DB_USERNAME:-edzero}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgsql-data:/var/lib/postgresql/data
      - ./docker/pgsql/init-site-db.sh:/docker-entrypoint-initdb.d/init-site-db.sh:ro
    networks:
      - app_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-edzero} -d ${DB_DATABASE:-edzero}']
      interval: 5s
      retries: 5

  license-pgsql:
    profiles: [license]
    image: postgres:17
    ports:
      - '${FORWARD_LICENSE_DB_PORT:-5433}:5432'
    environment:
      POSTGRES_DB: ${LICENSE_DB_DATABASE:-license}
      POSTGRES_USER: ${LICENSE_DB_USERNAME:-license}
      POSTGRES_PASSWORD: ${LICENSE_DB_PASSWORD:-secret}
    volumes:
      - license-pgsql-data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${LICENSE_DB_USERNAME:-license}']
      interval: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - '${FORWARD_REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    networks:
      - app_net

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - app_net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '${FORWARD_MINIO_PORT:-9000}:9000'
      - '${FORWARD_MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minio123}
    volumes:
      - minio-data:/data
    networks:
      - app_net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minio123}
      AWS_BUCKET: ${AWS_BUCKET:-edzero}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 1; done;
      mc mb local/$$AWS_BUCKET --ignore-existing;
      mc anonymous set download local/$$AWS_BUCKET;
      echo MinIO bucket $$AWS_BUCKET ready;
      "
    networks:
      - app_net

  meilisearch:
    profiles: [search]
    image: getmeili/meilisearch:latest
    ports:
      - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - app_net

  rabbitmq:
    profiles: [queue]
    image: rabbitmq:3-management-alpine
    ports:
      - '${FORWARD_RABBITMQ_PORT:-5672}:5672'
      - '${FORWARD_RABBITMQ_DASHBOARD_PORT:-15672}:15672'
    networks:
      - app_net

  pgadmin:
    profiles: [tools]
    image: dpage/pgadmin4
    env_file:
      - .env.local
    environment:
      PGADMIN_DEFAULT_EMAIL: '${PGADMIN_DEFAULT_EMAIL}'
      PGADMIN_DEFAULT_PASSWORD: '${PGADMIN_DEFAULT_PASSWORD}'
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'True'
      PGADMIN_CONFIG_MASTER_PASSWORD: "'secret'"
    ports:
      - '${FORWARD_PGADMIN_PORT:-5050}:80'
    depends_on:
      pgsql:
        condition: service_started
      license-pgsql:
        condition: service_healthy
        required: false
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json
    networks:
      - app_net

  redisinsight:
    profiles: [tools]
    image: redis/redisinsight:latest
    ports:
      - '${FORWARD_REDISINSIGHT_PORT:-5540}:5540'
    depends_on:
      - redis
    volumes:
      - redisinsight-data:/data
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  pgsql-data:
  license-pgsql-data:
  redis-data:
  minio-data:
  meilisearch-data:
  pgadmin-data:
  redisinsight-data:
